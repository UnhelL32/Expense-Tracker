<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal BDT Money Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --accent-expense: #ff6b6b;
            --accent-loan: #fcc419;
            --accent-savings: #4dadf7;
            --accent-earning: #51cf66;
            --accent-edit: #ff922b;
            --accent-balance: #a9e34b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 300; font-size: 2rem; letter-spacing: 1px; }

        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; text-align: center; }
        .card h3 { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .card .amount { font-size: 1.5rem; font-weight: 600; }
        .card.balance { border-left: 4px solid var(--accent-balance); }
        .card.expense { border-left: 4px solid var(--accent-expense); }
        .card.loan { border-left: 4px solid var(--accent-loan); }
        .card.savings { border-left: 4px solid var(--accent-savings); }
        .card.earning { border-left: 4px solid var(--accent-earning); }

        /* Visualization and Form Grid */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
        
        .panel { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; position: relative; }
        .panel h2 { font-size: 1.2rem; margin-bottom: 15px; font-weight: 400; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }

        /* Form Layout */
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        form input, form select, form button { background: #2a2a2a; border: 1px solid var(--border-color); color: var(--text-color); padding: 10px; border-radius: 4px; font-size: 0.9rem; width: 100%; }
        form input:focus, form select:focus { border-color: #666; outline: none; }
        form .full-width { grid-column: span 2; }
        form button { background: #333; cursor: pointer; transition: background 0.2s; font-weight: 600; }
        form button:hover { background: #444; }
        form button.editing-mode { background: var(--accent-edit); color: #000; }
        form button.editing-mode:hover { background: #e87e15; }
        
        /* Notice badge for editing state */
        .edit-badge { display: none; background: var(--accent-edit); color: #000; padding: 2px 8px; font-size: 0.75rem; border-radius: 4px; margin-left: 10px; font-weight: bold; vertical-align: middle; }

        /* Chart Canvas Wrapper */
        .chart-container { position: relative; height: 260px; width: 100%; display: flex; justify-content: center; }

        /* Database Tables Section */
        .db-section { margin-top: 40px; }
        .tab-buttons { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 10px 20px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .tab-btn.active { color: var(--text-color); border-bottom: 2px solid var(--text-color); font-weight: 600; }
        
        .table-wrapper { overflow-x: auto; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        
        .delete-btn { background: none; border: none; color: var(--accent-expense); cursor: pointer; font-size: 0.8rem; }
        .edit-btn { background: none; border: none; color: var(--accent-edit); cursor: pointer; font-size: 0.8rem; margin-right: 8px; }
        .mitigate-btn { background: none; border: none; color: var(--accent-loan); cursor: pointer; font-size: 0.8rem; margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>৳ BDT Wealth Tracker</h1>
    </header>

    <div class="summary-grid">
        <div class="card balance">
            <h3>Available Balance</h3>
            <div class="amount" id="sum-balance">৳0</div>
        </div>
        <div class="card earning">
            <h3>Total Earnings</h3>
            <div class="amount" id="sum-earning">৳0</div>
        </div>
        <div class="card expense">
            <h3>Total Expenses</h3>
            <div class="amount" id="sum-expense">৳0</div>
        </div>
        <div class="card loan">
            <h3>Active Loans</h3>
            <div class="amount" id="sum-loan">৳0</div>
        </div>
        <div class="card savings">
            <h3>Total Savings</h3>
            <div class="amount" id="sum-savings">৳0</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <h2>
                <span id="form-title-text">Add New Record</span>
                <span id="edit-indicator" class="edit-badge">EDITING</span>
            </h2>
            <form id="finance-form">
                <div class="full-width">
                    <select id="type-select" onchange="adjustFormFields()">
                        <option value="expense">Expense</option>
                        <option value="loan">Loan</option>
                        <option value="savings">Savings</option>
                        <option value="earning">Earning</option>
                    </select>
                </div>
                
                <input type="number" id="amount" placeholder="Amount (BDT)" required min="1">
                <input type="date" id="entry-date" required>
                
                <div class="full-width" style="display: flex; gap: 5px;">
                    <input type="text" id="category-input" list="category-list" placeholder="Category" required autocomplete="off">
                    <datalist id="category-list"></datalist>
                </div>

                <div id="conditional-fields" class="full-width" style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                    </div>

                <button type="submit" id="submit-btn" class="full-width">Save Entry</button>
                <button type="button" id="cancel-edit-btn" class="full-width" style="display:none; background:#444;" onclick="cancelEditing()">Cancel Edit</button>
            </form>
        </div>

        <div class="panel">
            <h2>Financial Breakdown</h2>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <div class="db-section">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('expense')">Expenses</button>
            <button class="tab-btn" onclick="switchTab('loan')">Loans</button>
            <button class="tab-btn" onclick="switchTab('savings')">Savings</button>
            <button class="tab-btn" onclick="switchTab('earning')">Earnings</button>
            <button class="tab-btn" onclick="switchTab('categories')">Category Summary</button>
        </div>

        <div class="table-wrapper" id="table-container">
            </div>
    </div>
</div>

<script>
    // App State Core Database
    let records = JSON.parse(localStorage.getItem('bdt_records')) || [];
    let categories = JSON.parse(localStorage.getItem('bdt_categories')) || {
        expense: [], loan: [], savings: [], earning: []
    };
    
    let currentTab = 'expense';
    let myChart = null;
    let editingRecordId = null;

    // Form Field Condition Configuration
    function adjustFormFields() {
        const type = document.getElementById('type-select').value;
        const container = document.getElementById('conditional-fields');
        
        const existingSecondaryDateValue = document.getElementById('secondary-date') ? document.getElementById('secondary-date').value : '';
        container.innerHTML = '';
        
        // Refresh Category Datalist Autofill Options
        const datalist = document.getElementById('category-list');
        datalist.innerHTML = '';
        categories[type].forEach(cat => {
            let option = document.createElement('option');
            option.value = cat;
            datalist.appendChild(option);
        });

        // Add conditional date logic requested for loans only
        if (type === 'loan') {
            container.innerHTML = '<label style="font-size:0.8rem; color:var(--text-muted)">Mitigation Date (Optional):</label><input type="date" id="secondary-date">';
            if(existingSecondaryDateValue) document.getElementById('secondary-date').value = existingSecondaryDateValue;
        }
    }

    // Set standard default date to today
    document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];

    // Form Submit Event Handler (Handles both Save and Update)
    document.getElementById('finance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const type = document.getElementById('type-select').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const entryDate = document.getElementById('entry-date').value;
        const category = document.getElementById('category-input').value.trim();
        const secondaryDateInput = document.getElementById('secondary-date');
        const secondaryDate = secondaryDateInput ? secondaryDateInput.value : '';

        if(!category) return;

        if (!categories[type].includes(category)) {
            categories[type].push(category);
            localStorage.setItem('bdt_categories', JSON.stringify(categories));
        }

        if (editingRecordId !== null) {
            // EDITING EXISTING ENTRY MODE
            records = records.map(r => {
                if (r.id === editingRecordId) {
                    return {
                        ...r,
                        type,
                        amount,
                        entryDate,
                        category,
                        secondaryDate: type === 'loan' ? (secondaryDate || null) : entryDate
                    };
                }
                return r;
            });
            editingRecordId = null;
            
            document.getElementById('form-title-text').innerText = "Add New Record";
            document.getElementById('edit-indicator').style.display = "none";
            document.getElementById('submit-btn').innerText = "Save Entry";
            document.getElementById('submit-btn').classList.remove('editing-mode');
            document.getElementById('cancel-edit-btn').style.display = "none";
            document.getElementById('type-select').disabled = false;
        } else {
            // ADD NEW ENTRY MODE
            const record = {
                id: Date.now(),
                type,
                amount,
                entryDate,
                category,
                secondaryDate: type === 'earning' ? entryDate : (secondaryDate || null)
            };
            records.push(record);
        }

        saveAndRender();
        
        document.getElementById('amount').value = '';
        document.getElementById('category-input').value = '';
        document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
        adjustFormFields();
    });

    // Enter Editing Mode Function
    function startEdit(id) {
        const record = records.find(r => r.id === id);
        if (!record) return;

        editingRecordId = id;

        document.getElementById('type-select').value = record.type;
        document.getElementById('type-select').disabled = true; 
        adjustFormFields();

        document.getElementById('amount').value = record.amount;
        document.getElementById('entry-date').value = record.entryDate;
        document.getElementById('category-input').value = record.category;
        
        if (record.secondaryDate && document.getElementById('secondary-date') && record.type === 'loan') {
            document.getElementById('secondary-date').value = record.secondaryDate;
        }

        document.getElementById('form-title-text').innerText = "Modify Record";
        document.getElementById('edit-indicator').style.display = "inline-block";
        document.getElementById('submit-btn').innerText = "Update Entry";
        document.getElementById('submit-btn').classList.add('editing-mode');
        document.getElementById('cancel-edit-btn').style.display = "block";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Cancel Editing Routine
    function cancelEditing() {
        editingRecordId = null;
        document.getElementById('form-title-text').innerText = "Add New Record";
        document.getElementById('edit-indicator').style.display = "none";
        document.getElementById('submit-btn').innerText = "Save Entry";
        document.getElementById('submit-btn').classList.remove('editing-mode');
        document.getElementById('cancel-edit-btn').style.display = "none";
        document.getElementById('type-select').disabled = false;

        document.getElementById('amount').value = '';
        document.getElementById('category-input').value = '';
        document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];
        adjustFormFields();
    }

    // Fail-safe Deletion Trigger
    function deleteRecord(id) {
        if (confirm("Are you sure you want to permanently delete this BDT entry?")) {
            if (editingRecordId === id) cancelEditing();
            records = records.filter(r => r.id !== id);
            saveAndRender();
        }
    }

    function toggleLoanMitigation(id) {
        const record = records.find(r => r.id === id);
        if(record) {
            record.secondaryDate = record.secondaryDate ? null : new Date().toISOString().split('T')[0];
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('bdt_records', JSON.stringify(records));
        calculateFinances();
        renderTable();
        renderChart();
    }

    function switchTab(tabName) {
        currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderTable();
    }

    // Core Calculation Logic with updated auto-encash rules
    function calculateFinances() {
        let totalEarnings = 0;
        let totalExpenses = 0;
        let activeLoans = 0;
        let totalSavings = 0;
        let trackingBalance = 0;

        records.forEach(r => {
            if (r.type === 'earning') {
                totalEarnings += r.amount;
                trackingBalance += r.amount; 
            } else if (r.type === 'expense') {
                totalExpenses += r.amount;
                trackingBalance -= r.amount; 
            } else if (r.type === 'loan') {
                if (!r.secondaryDate) {
                    activeLoans += r.amount; 
                } else {
                    trackingBalance -= r.amount; 
                }
            } else if (r.type === 'savings') {
                totalSavings += r.amount;
            }
        });

        document.getElementById('sum-balance').innerText = `৳${trackingBalance.toLocaleString()}`;
        document.getElementById('sum-earning').innerText = `৳${totalEarnings.toLocaleString()}`;
        document.getElementById('sum-expense').innerText = `৳${totalExpenses.toLocaleString()}`;
        document.getElementById('sum-loan').innerText = `৳${activeLoans.toLocaleString()}`;
        document.getElementById('sum-savings').innerText = `৳${totalSavings.toLocaleString()}`;

        return { totalExpenses, activeLoans, totalSavings, totalEarnings, trackingBalance };
    }

    // Render Data Logs & Cumulative Category Matrix Databases
    function renderTable() {
        const container = document.getElementById('table-container');
        
        if (currentTab === 'categories') {
            let catSummary = {};
            let globalExpenses = 0, globalLoans = 0, globalSavings = 0, globalEarnings = 0, globalNetBalance = 0;

            records.forEach(r => {
                if(!catSummary[r.category]) {
                    catSummary[r.category] = { expense: 0, loan: 0, mitigatedLoan: 0, savings: 0, earning: 0 };
                }
                
                if (r.type === 'loan') {
                    catSummary[r.category].loan += r.amount;
                    if (r.secondaryDate) {
                        catSummary[r.category].mitigatedLoan += r.amount;
                    }
                } else {
                    catSummary[r.category][r.type] += r.amount;
                }
            });

            let html = `<table><thead><tr>
                <th>Category Name</th>
                <th>Expenses (৳)</th>
                <th>Active Loans (৳)</th>
                <th>Savings (৳)</th>
                <th>Earnings (৳)</th>
                <th>Net Balance (৳)</th>
            </tr></thead><tbody>`;
            
            for (let cat in catSummary) {
                // Calculate Category Wise Balance: Earnings - Expenses - Mitigated Loans
                let catNetBalance = catSummary[cat].earning - catSummary[cat].expense - catSummary[cat].mitigatedLoan;
                let activeOutstandingLoans = catSummary[cat].loan - catSummary[cat].mitigatedLoan;

                // Tally Global Columns
                globalExpenses += catSummary[cat].expense;
                globalLoans += activeOutstandingLoans;
                globalSavings += catSummary[cat].savings;
                globalEarnings += catSummary[cat].earning;
                globalNetBalance += catNetBalance;

                html += `<tr>
                    <td><strong>${cat}</strong></td>
                    <td style="color:var(--accent-expense)">${catSummary[cat].expense.toLocaleString()}</td>
                    <td style="color:var(--accent-loan)">${activeOutstandingLoans.toLocaleString()}</td>
                    <td style="color:var(--accent-savings)">${catSummary[cat].savings.toLocaleString()}</td>
                    <td style="color:var(--accent-earning)">${catSummary[cat].earning.toLocaleString()}</td>
                    <td style="color:var(--accent-balance); font-weight: 600;">${catNetBalance.toLocaleString()}</td>
                </tr>`;
            }

            // Global Summary Metrics Bottom Cumulative Row
            if (Object.keys(catSummary).length === 0) {
                html += `<tr><td colspan="6" style="text-align:center; color:var(--text-muted);">No records found. Create entries to generate matrix summaries.</td></tr>`;
            } else {
                html += `<tr style="background:#252525; font-weight:bold; border-top: 2px solid var(--border-color);">
                    <td>Global Totals</td>
                    <td style="color:var(--accent-expense)">৳${globalExpenses.toLocaleString()}</td>
                    <td style="color:var(--accent-loan)">৳${globalLoans.toLocaleString()}</td>
                    <td style="color:var(--accent-savings)">৳${globalSavings.toLocaleString()}</td>
                    <td style="color:var(--accent-earning)">৳${globalEarnings.toLocaleString()}</td>
                    <td style="color:var(--accent-balance)">৳${globalNetBalance.toLocaleString()}</td>
                </tr>`;
            }

            html += '</tbody></table>';
            container.innerHTML = html;
            return;
        }

        // Standard Ledger Tables View 
        let filtered = records.filter(r => r.type === currentTab);
        let totalSum = filtered.reduce((sum, r) => sum + r.amount, 0);

        let html = `<table><thead><tr>
            <th>Date</th>
            <th>Category</th>
            <th>Amount</th>
            ${currentTab === 'loan' ? '<th>Mitigated Date</th>' : ''}
            <th>Action Matrix Control</th>
        </tr></thead><tbody>`;

        filtered.forEach(r => {
            let statusActionBtn = '';
            if (currentTab === 'loan') {
                statusActionBtn = `<button class="mitigate-btn" onclick="toggleLoanMitigation(${r.id})">${r.secondaryDate ? '✕ Activating' : '✓ Mitigate'}</button>`;
            }

            html += `<tr>
                <td>${r.entryDate}</td>
                <td>${r.category}</td>
                <td><strong>৳${r.amount.toLocaleString()}</strong></td>
                ${currentTab === 'loan' ? `<td>${r.secondaryDate ? r.secondaryDate : '<span style="color:var(--accent-loan)">Active</span>'}</td>` : ''}
                <td>
                    ${statusActionBtn}
                    <button class="edit-btn" onclick="startEdit(${r.id})">Edit</button>
                    <button class="delete-btn" onclick="deleteRecord(${r.id})">Delete</button>
                </td>
            </tr>`;
        });

        if(filtered.length === 0) {
            html += `<tr><td colspan="${currentTab === 'loan' ? '5' : '4'}" style="text-align:center; color:var(--text-muted);">No records found under this macro category.</td></tr>`;
        } else {
            html += `<tr style="background:#252525; font-weight:bold;">
                <td>Cumulative Total</td>
                <td>—</td>
                <td colspan="${currentTab==='loan' ? '2' : '1'}">৳${totalSum.toLocaleString()}</td>
                <td>—</td>
            </tr>`;
        }

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // Graphical Representation Engine (Chart.js implementation)
    function renderChart() {
        const dataMetrics = calculateFinances();
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        const chartData = [
            dataMetrics.totalExpenses, 
            dataMetrics.activeLoans, 
            dataMetrics.totalSavings, 
            dataMetrics.totalEarnings
        ];

        if (myChart) {
            myChart.data.datasets[0].data = chartData;
            myChart.update();
        } else {
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Expenses', 'Active Loans', 'Savings', 'Earnings'],
                    datasets: [{
                        data: chartData,
                        backgroundColor: ['#ff6b6b', '#fcc419', '#4dadf7', '#51cf66'],
                        borderWidth: 2,
                        borderColor: '#1e1e1e'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#e0e0e0', font: { size: 12 } }
                        }
                    }
                }
            });
        }
    }

    // Initialize components on load
    adjustFormFields();
    saveAndRender();
</script>
</body>
</html>
